

services:

  backend:
    build:
      context: .
    command: >
      sh -c "
      sleep 5 &&
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "

    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    volumes:
      - .:/app

  db:
    image: 'postgres:15'
    env_file:
      - .env
    environment:
      POSTGRES_DB: '${DB_NAME}'
      POSTGRES_USER: '${DB_USER}'
      POSTGRES_PASSWORD: '${DB_PASSWORD}'
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  celery_worker:
    build:
      context: .
    command: celery -A config worker -l info
    depends_on:
      - backend
      - redis
    env_file:
      - .env
    volumes:
      - .:/app
  celery_beat:
    build:
      context: .
    command: celery -A config beat -l info
    depends_on:
      - backend
      - redis
    env_file:
      - .env
    volumes:
      - .:/app
volumes:
  postgres_data:
  redis_data:
